<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no,maximum-scale=1.0,minimum-scale=1.0">
<title>퇴근 발사기</title>
<meta name="theme-color" content="#1A1A2E">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{width:100%;height:100%;overflow:hidden;background:#0D0D1A;font-family:system-ui,-apple-system,'Segoe UI',sans-serif;touch-action:none;user-select:none;-webkit-user-select:none}
#wrap{position:relative;width:100%;height:100%;max-width:480px;margin:0 auto;overflow:hidden;background:#0D0D1A}
canvas#c{display:block;width:100%;height:100%;position:absolute;top:0;left:0}
.overlay{position:absolute;top:0;left:0;width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:10;pointer-events:none}
.overlay>*{pointer-events:auto}
.hidden{display:none!important}
#landing{z-index:10;justify-content:flex-start;padding-top:18vh}
#landing h1{font-size:clamp(36px,10vw,52px);font-weight:900;color:#fff;text-shadow:0 0 30px rgba(255,107,53,.6),0 0 60px rgba(255,107,53,.3),0 4px 8px rgba(0,0,0,.5);margin-bottom:8px;letter-spacing:-2px}
#landing .sub{color:rgba(255,255,255,.55);font-size:15px;margin-bottom:32px;letter-spacing:1px}
#nameInput,#nameInputC{background:rgba(255,255,255,.08);border:2px solid rgba(255,255,255,.2);border-radius:14px;padding:12px 16px;color:#fff;font-size:16px;text-align:center;width:220px;margin-bottom:16px;outline:none;transition:border-color .2s}
#nameInput:focus,#nameInputC:focus{border-color:#FF6B35}
#nameInput::placeholder,#nameInputC::placeholder{color:rgba(255,255,255,.25)}
.cta{background:#FF6B35;color:#fff;border:none;padding:18px 40px;border-radius:18px;font-size:19px;font-weight:800;cursor:pointer;box-shadow:0 6px 24px rgba(255,107,53,.45);transition:transform .12s,box-shadow .12s;animation:ctaPulse 2.2s ease-in-out infinite;letter-spacing:-.3px}
.cta:active{transform:scale(.94)!important;box-shadow:0 2px 12px rgba(255,107,53,.3)}
@keyframes ctaPulse{0%,100%{transform:scale(1)}50%{transform:scale(1.04);box-shadow:0 8px 32px rgba(255,107,53,.55)}}
#micErr{color:#FF6B35;font-size:13px;margin-top:14px;text-align:center;max-width:260px;line-height:1.5;display:none}
#cdScreen{z-index:20;font-size:min(140px,30vw);font-weight:900;color:#fff;text-shadow:0 0 50px rgba(255,255,255,.4)}
#hud{position:absolute;top:0;left:0;width:100%;height:100%;z-index:5;pointer-events:none}
#volBar{position:absolute;left:10px;top:50%;transform:translateY(-50%);width:22px;height:min(220px,35vh);border-radius:11px;border:2px solid rgba(255,255,255,.25);overflow:hidden;background:rgba(0,0,0,.35);backdrop-filter:blur(4px)}
#volFill{position:absolute;bottom:0;left:0;width:100%;background:linear-gradient(to top,#4CAF50 0%,#FFEB3B 40%,#F44336 70%,#9C27B0 100%);border-radius:9px;transition:height 60ms linear}
#volGlow{position:absolute;bottom:0;left:-4px;width:30px;border-radius:15px;background:radial-gradient(ellipse,rgba(156,39,176,.6),transparent);transition:height 60ms;opacity:0}
#volNum{position:absolute;left:10px;top:calc(50% - 128px);color:#fff;font-size:11px;font-family:monospace;font-weight:700;text-shadow:0 1px 4px #000;width:22px;text-align:center}
#distNum{position:absolute;top:max(12px,env(safe-area-inset-top));left:50%;transform:translateX(-50%);color:#fff;font-family:monospace;font-size:clamp(24px,7vw,34px);font-weight:900;text-shadow:0 2px 12px rgba(0,0,0,.7),0 0 20px rgba(255,215,0,.3);letter-spacing:-1px}
#gBar{position:absolute;top:calc(max(12px,env(safe-area-inset-top)) + 44px);left:14px;right:14px;height:26px;background:rgba(0,0,0,.4);border-radius:13px;overflow:visible;display:none;backdrop-filter:blur(4px);border:1px solid rgba(255,255,255,.1)}
#gBarMe{position:absolute;left:0;top:0;height:100%;background:linear-gradient(90deg,#FF6B35,#FFD700);border-radius:13px;min-width:10px;transition:width 80ms;box-shadow:0 0 10px rgba(255,107,53,.4)}
#gBarThem{position:absolute;right:0;top:0;height:100%;background:rgba(255,255,255,.2);border-radius:13px;min-width:10px}
#gLabels{position:absolute;top:calc(max(12px,env(safe-area-inset-top)) + 72px);left:14px;right:14px;display:flex;justify-content:space-between;color:#fff;font-size:11px;font-weight:700;text-shadow:0 1px 3px #000}
#floatText{position:absolute;top:35%;left:50%;transform:translate(-50%,-50%);color:#FFD700;font-size:clamp(24px,7vw,36px);font-weight:900;text-shadow:0 0 24px rgba(255,215,0,.7),0 4px 8px rgba(0,0,0,.5);z-index:15;opacity:0;pointer-events:none;white-space:nowrap;transition:opacity .3s}
#challenge{z-index:25;background:rgba(13,13,26,.92);backdrop-filter:blur(8px);padding:15vh 24px 24px;text-align:center;justify-content:flex-start}
#challenge h2{color:#FFD700;font-size:26px;font-weight:900;margin-bottom:20px;text-shadow:0 0 20px rgba(255,215,0,.3)}
#challenge .rec{color:#fff;font-size:17px;margin-bottom:8px;line-height:1.6}
#challenge .taunt{color:rgba(255,255,255,.5);font-size:15px;margin-bottom:28px}
#challenge .ghost-preview{width:60px;height:80px;margin:0 auto 20px;opacity:.4}
#result{z-index:30;background:rgba(13,13,26,.94);backdrop-filter:blur(10px);overflow-y:auto;-webkit-overflow-scrolling:touch;padding:16px 0}
#result .card{width:calc(100% - 32px);max-width:400px;margin:0 auto;background:linear-gradient(145deg,#1A1A2E 0%,#16213E 100%);border-radius:28px;padding:32px 24px;text-align:center;border:1px solid rgba(255,255,255,.08);box-shadow:0 24px 80px rgba(0,0,0,.6)}
#result .card h2{color:rgba(255,215,0,.8);font-size:14px;letter-spacing:3px;margin-bottom:20px;font-weight:600;text-transform:uppercase}
#result .dist{font-family:monospace;font-size:clamp(44px,12vw,64px);font-weight:900;color:#fff;margin:4px 0 12px;text-shadow:0 0 30px rgba(255,215,0,.35);letter-spacing:-2px}
#result .badge{display:inline-block;background:linear-gradient(135deg,#FF6B35,#FFD700);color:#1A1A2E;padding:10px 24px;border-radius:24px;font-weight:900;font-size:18px;margin:4px 0 6px;box-shadow:0 4px 16px rgba(255,107,53,.3)}
#result .sub{color:rgba(255,255,255,.6);font-size:14px;margin-bottom:16px;font-style:italic}
#result .vs{color:#FFD700;font-size:22px;font-weight:900;margin:16px 0;text-shadow:0 0 15px rgba(255,215,0,.4);line-height:1.5}
#result .stats{text-align:left;background:rgba(255,255,255,.04);border-radius:16px;padding:16px 18px;margin:16px 0;border:1px solid rgba(255,255,255,.05)}
#result .stat{display:flex;justify-content:space-between;align-items:center;padding:8px 0;color:rgba(255,255,255,.75);font-size:13px;border-bottom:1px solid rgba(255,255,255,.04)}
#result .stat:last-child{border:none}
#result .stat b{color:#fff;font-family:monospace;font-weight:800}
#waveC{width:100%;height:60px;border-radius:10px;margin:12px 0;background:rgba(255,255,255,.02)}
#result .ts{color:rgba(255,255,255,.35);font-size:12px;margin:10px 0 4px}
.btns{display:flex;gap:10px;margin-top:18px;justify-content:center;flex-wrap:wrap}
.btns button{padding:13px 22px;border-radius:14px;border:none;font-size:14px;font-weight:700;cursor:pointer;transition:transform .1s,opacity .1s;letter-spacing:-.2px}
.btns button:active{transform:scale(.94)}
.btn-share{background:#25D366;color:#fff}
.btn-copy{background:rgba(255,255,255,.12);color:#fff}
.btn-retry{background:#FF6B35;color:#fff}
#toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:rgba(37,211,102,.95);color:#fff;padding:10px 28px;border-radius:24px;font-size:14px;font-weight:700;opacity:0;transition:opacity .25s;z-index:999;pointer-events:none;backdrop-filter:blur(4px)}
@media(min-width:481px){body{background:#0a0a12}#wrap{box-shadow:0 0 60px rgba(0,0,0,.5)}}
</style>
</head>
<body>
<div id="wrap">
<canvas id="c"></canvas>

<div id="landing" class="overlay">
  <h1>퇴근 발사기</h1>
  <div class="sub">소리 질러서 탈출하라</div>
  <input id="nameInput" type="text" placeholder="이름 (최대 10자)" maxlength="10">
  <button class="cta" id="startBtn">🎤 소리 질러서 퇴근하기</button>
  <div id="micErr"></div>
</div>

<div id="cdScreen" class="overlay hidden"></div>

<div id="hud" class="hidden">
  <div id="volBar"><div id="volFill"></div><div id="volGlow"></div></div>
  <div id="volNum">0</div>
  <div id="distNum">0m</div>
  <div id="gBar"><div id="gBarMe"></div><div id="gBarThem"></div></div>
  <div id="gLabels" class="hidden"><span id="glMe">나 0m</span><span id="glTh">0m</span></div>
</div>

<div id="floatText"></div>

<div id="challenge" class="overlay hidden">
  <h2>⚔️ 대결 신청</h2>
  <div class="rec" id="chRec"></div>
  <div class="taunt" id="chTaunt">이 기록을 이길 수 있겠어?</div>
  <input id="nameInputC" type="text" placeholder="이름 (최대 10자)" maxlength="10">
  <button class="cta" id="chBtn">🔥 도전하기</button>
</div>

<div id="result" class="overlay hidden">
  <div class="card">
    <h2>퇴근 발사기</h2>
    <div class="dist" id="rDist">0m</div>
    <div class="badge" id="rTitle"></div>
    <div class="sub" id="rSub"></div>
    <div class="vs hidden" id="rVs"></div>
    <div class="stats" id="rStats"></div>
    <canvas id="waveC"></canvas>
    <div class="ts" id="rTs"></div>
    <div class="btns">
      <button class="btn-copy" id="bCopy">🔗 링크 복사</button>
      <button class="btn-share" id="bShare">📱 공유</button>
      <button class="btn-retry" id="bRetry">🔄 다시 소리지르기</button>
    </div>
  </div>
</div>

<div id="toast">복사 완료!</div>
</div>

<script>
'use strict';

// ═══════════════════════════════════════
// Canvas & Sizing
// ═══════════════════════════════════════
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const wrap = document.getElementById('wrap');
let W, H, DPR;

function resize() {
  DPR = Math.min(window.devicePixelRatio || 1, 2);
  W = wrap.clientWidth;
  H = wrap.clientHeight;
  canvas.width = W * DPR;
  canvas.height = H * DPR;
  ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
}
resize();
window.addEventListener('resize', resize);

// ═══════════════════════════════════════
// Audio Engine
// ═══════════════════════════════════════
let actx = null;
function initAudio() { if (!actx) actx = new (window.AudioContext || window.webkitAudioContext)(); if (actx.state === 'suspended') actx.resume(); }

function tone(freq, dur, type = 'sine', vol = 0.12, endFreq = null) {
  initAudio();
  const t = actx.currentTime;
  const osc = actx.createOscillator();
  const gain = actx.createGain();
  osc.type = type;
  osc.frequency.setValueAtTime(freq, t);
  if (endFreq) osc.frequency.linearRampToValueAtTime(endFreq, t + dur);
  gain.gain.setValueAtTime(vol, t);
  gain.gain.exponentialRampToValueAtTime(0.001, t + dur);
  osc.connect(gain).connect(actx.destination);
  osc.start(t);
  osc.stop(t + dur);
}

function noise(dur, vol = 0.08) {
  initAudio();
  const t = actx.currentTime;
  const buf = actx.createBuffer(1, actx.sampleRate * dur, actx.sampleRate);
  const ch = buf.getChannelData(0);
  for (let i = 0; i < ch.length; i++) ch[i] = Math.random() * 2 - 1;
  const src = actx.createBufferSource();
  const gain = actx.createGain();
  src.buffer = buf;
  gain.gain.setValueAtTime(vol, t);
  gain.gain.exponentialRampToValueAtTime(0.001, t + dur);
  src.connect(gain).connect(actx.destination);
  src.start(t);
  src.stop(t + dur);
}

const SFX = {
  countdown() { tone(440, 0.1, 'square', 0.08); },
  go() { tone(880, 0.15, 'square', 0.1); },
  launch() { tone(100, 0.35, 'sawtooth', 0.1, 900); noise(0.2, 0.06); },
  hit() { tone(150, 0.06, 'square', 0.12); },
  destroy() { noise(0.2, 0.1); tone(1200, 0.12, 'sine', 0.06); tone(800, 0.08, 'triangle', 0.05); },
  boom() { noise(0.5, 0.15); tone(60, 0.4, 'sine', 0.12); },
  land() { tone(80, 0.25, 'sine', 0.12); },
  win() { [523, 659, 784, 1047].forEach((f, i) => setTimeout(() => tone(f, 0.18, 'sine', 0.1), i * 110)); },
  overtake() { tone(660, 0.1, 'square', 0.08); tone(880, 0.15, 'square', 0.08); }
};

// ═══════════════════════════════════════
// Ghost Data (URL parsing)
// ═══════════════════════════════════════
let ghost = null;
try {
  const p = new URLSearchParams(location.search);
  if (p.has('g')) {
    const raw = p.get('g').replace(/[^A-Za-z0-9+/=]/g, '');
    ghost = JSON.parse(decodeURIComponent(escape(atob(raw))));
  }
} catch (e) { ghost = null; }

// ═══════════════════════════════════════
// Game Constants & State
// ═══════════════════════════════════════
const PH = { LAND: 0, CD: 1, PLAY: 2, FALL: 3, RESULT: 4, CHALLENGE: 5 };
let phase = ghost ? PH.CHALLENGE : PH.LAND;
let name = '';

// Mic
let micStream = null, analyser = null, freqData = null;

// Game vars
let vol = 0, normVol = 0, thrust = 0, vel = 0, dist = 0, maxVol = 0;
let silentT = 0, gameT = 0;
const MAX_TIME = 10;
let obs = [], parts = [], floats = [];
let obsTimer = 0, destroyCount = 0, destroyTexts = [];
let volHist = [], hitIdxs = [];
let shakeAmt = 0, shakeX = 0, shakeY = 0;
let camOffX = 0, camOffY = 0, camTargX = 0, camTargY = 0;
let camRot = 0, camRotTarg = 0;
let prevVel = 0;
let flashA = 0, flashCol = '#FF1744';
let sonicActive = false, sonicT = 0;
let trails = [];

// Character physics animation
let charAngle = 0;        // current rotation angle in radians
let charVelAngle = 0;     // angular velocity (decays with damping)
let charHitTimer = 0;     // timer for hit recoil flash
let charHitFlash = false; // whether currently in hit flash
let legFrame = 0;         // leg animation frame counter
let legTimer = 0;         // timer for leg animation
let bounceTimer = 0;      // landing bounce timer
let bounceActive = false; // whether bounce is active

// Ghost play
let gDist = 0, gIdx = 0, gDone = false, gDoneShown = false;
let overtook = false, overtookShown = false;

// Countdown
let cdVal = 3, cdT = 0;
// Fall
let fallT = 0;
let fallImpacted = false;
let fallImpactT = 0;
// Landing idle
let idleT = 0;

// Float text
let floatTextA = 0, floatTextTimer = 0;
const $float = document.getElementById('floatText');

// Pre-generated stars (seeded for stability)
function seededRandom(seed) {
  let s = seed;
  return function() {
    s = (s * 16807 + 0) % 2147483647;
    return (s - 1) / 2147483646;
  };
}
const starRng = seededRandom(42);
const stars = Array.from({ length: 150 }, () => ({
  x: starRng(), y: starRng(), r: 0.5 + starRng() * 2, p: starRng() * Math.PI * 2,
  layer: starRng() < 0.5 ? 0.05 : (starRng() < 0.5 ? 0.1 : 0.15) // parallax factor
}));

// Pre-generated cloud positions (world altitudes 300-600m)
const cloudPositions = [
  { alt: 310, x: 0.1, scale: 1.2 },
  { alt: 350, x: 0.55, scale: 0.9 },
  { alt: 390, x: 0.25, scale: 1.0 },
  { alt: 430, x: 0.7, scale: 1.1 },
  { alt: 470, x: 0.15, scale: 0.8 },
  { alt: 510, x: 0.6, scale: 1.3 },
  { alt: 540, x: 0.35, scale: 0.95 },
  { alt: 580, x: 0.8, scale: 1.0 },
  { alt: 600, x: 0.45, scale: 1.15 },
  { alt: 340, x: 0.9, scale: 0.85 },
  { alt: 420, x: 0.05, scale: 1.05 },
  { alt: 500, x: 0.75, scale: 0.9 }
];

// Pre-generated buildings
const buildings = Array.from({ length: 20 }, (_, i) => ({
  x: (i / 20) + (Math.random() - 0.5) * 0.05,
  w: 28 + Math.random() * 45,
  h: 70 + Math.random() * 180,
  dark: Math.random() > 0.5,
  winOn: Array.from({ length: 100 }, () => Math.random() > 0.3)
}));

// Obstacle texts
const OBS_TEXTS = [
  "이거 하나만", "잠깐 통화 돼?", "이거 오늘 중으로 가능?",
  "내일 아침 회의 10분만", "주말에 잠깐만...", "긴급 회의 소환",
  "내일까지 보고서", "이거 어디까지 했어?", "슬랙 확인 좀",
  "메일 보셨죠?", "잠깐 얘기 좀", "이거 수정 부탁",
  "오늘 야근 가능?", "점심때 미팅 잡자", "이거 ASAP",
  "컨펌 부탁드려요", "일정 조율 좀", "리뷰 부탁합니다",
  "이슈 터졌어요", "클라이언트 전화 왔어"
];

// Titles
const TITLES = [
  { d: 0, t: "엘리베이터에서 잡힘", s: '"부장님: 이거 하나만"' },
  { d: 50, t: "로비 탈출 성공", s: '"경비 아저씨가 응원해줌"' },
  { d: 100, t: "회사 앞 편의점 도착", s: '"삼각김밥 획득 🍙"' },
  { d: 200, t: "지하철 착석 성공", s: '"퇴근 모드 ON"' },
  { d: 400, t: "한강 도착", s: '"치맥 각"' },
  { d: 600, t: "제주도 도착", s: '"사직서 자동 생성됨"' },
  { d: 800, t: "대기권 돌파", s: '"연차 무한 승인"' },
  { d: 1000, t: "슬랙 알림 영구 차단", s: '"인류를 초월함"' }
];

function getTitle(d) {
  let r = TITLES[0];
  for (const t of TITLES) if (d >= t.d) r = t;
  return r;
}

// ═══════════════════════════════════════
// Microphone
// ═══════════════════════════════════════
async function setupMic() {
  initAudio();
  try {
    micStream = await navigator.mediaDevices.getUserMedia({ audio: true });
    const src = actx.createMediaStreamSource(micStream);
    analyser = actx.createAnalyser();
    analyser.fftSize = 256;
    analyser.smoothingTimeConstant = 0.4;
    src.connect(analyser);
    freqData = new Uint8Array(analyser.frequencyBinCount);
    return true;
  } catch (e) { return false; }
}

function readVol() {
  if (!analyser) return 0;
  analyser.getByteFrequencyData(freqData);
  let sum = 0;
  for (let i = 0; i < freqData.length; i++) sum += freqData[i];
  return sum / freqData.length;
}

function stopMic() {
  if (micStream) { micStream.getTracks().forEach(t => t.stop()); micStream = null; analyser = null; }
}

// ═══════════════════════════════════════
// UI Elements
// ═══════════════════════════════════════
const $ = id => document.getElementById(id);
const $landing = $('landing'), $startBtn = $('startBtn'), $micErr = $('micErr');
const $cd = $('cdScreen'), $hud = $('hud');
const $volFill = $('volFill'), $volGlow = $('volGlow'), $volNum = $('volNum');
const $distNum = $('distNum');
const $gBar = $('gBar'), $gBarMe = $('gBarMe'), $gBarThem = $('gBarThem');
const $gLabels = $('gLabels'), $glMe = $('glMe'), $glTh = $('glTh');
const $challenge = $('challenge'), $chRec = $('chRec'), $chTaunt = $('chTaunt'), $chBtn = $('chBtn');
const $result = $('result'), $rDist = $('rDist'), $rTitle = $('rTitle'), $rSub = $('rSub');
const $rVs = $('rVs'), $rStats = $('rStats'), $rTs = $('rTs');
const $bCopy = $('bCopy'), $bShare = $('bShare'), $bRetry = $('bRetry');
const $toast = $('toast');
const $nameI = $('nameInput'), $nameIC = $('nameInputC');

// ═══════════════════════════════════════
// Challenge Screen Setup
// ═══════════════════════════════════════
if (ghost) {
  $landing.classList.add('hidden');
  $challenge.classList.remove('hidden');
  const gt = getTitle(ghost.d);
  $chRec.innerHTML = `<b>${ghost.n || '???'}</b>님의 기록<br><span style="font-size:32px;font-weight:900;color:#FFD700">${Math.round(ghost.d)}m</span><br><span style="color:rgba(255,255,255,.5)">${gt.t}</span>`;
}

// ═══════════════════════════════════════
// Event Handlers
// ═══════════════════════════════════════
$startBtn.onclick = async () => {
  name = ($nameI.value || '나').substring(0, 10);
  const ok = await setupMic();
  if (ok) { $landing.classList.add('hidden'); beginCountdown(); }
  else { $micErr.style.display = 'block'; $micErr.textContent = '마이크 없이는 퇴근 못합니다 (현실과 동일)'; }
};

function shareUrl() {
  const samples = [];
  const step = Math.max(1, Math.floor(volHist.length / 50));
  for (let i = 0; i < volHist.length && samples.length < 50; i += step) {
    samples.push(Math.round(volHist[i]));
  }
  const data = { n: name, d: Math.round(dist), t: getTitle(dist).t, v: samples, o: destroyCount, ts: Date.now() };
  return location.origin + location.pathname + '?g=' + btoa(unescape(encodeURIComponent(JSON.stringify(data))));
}

// ═══════════════════════════════════════
// Waveform
// ═══════════════════════════════════════
function drawWaveform() {
  const wc = $('waveC');
  const wx = wc.getContext('2d');
  const dpr = 2;
  wc.width = wc.clientWidth * dpr;
  wc.height = wc.clientHeight * dpr;
  wx.scale(dpr, dpr);
  const rw = wc.clientWidth, rh = wc.clientHeight;

  if (!volHist.length) return;

  wx.fillStyle = 'rgba(255,255,255,0.02)';
  wx.fillRect(0, 0, rw, rh);

  const len = volHist.length;
  const dx = rw / len;

  const grd = wx.createLinearGradient(0, 0, rw, 0);
  grd.addColorStop(0, '#4CAF50');
  grd.addColorStop(0.35, '#FFEB3B');
  grd.addColorStop(0.65, '#FF6B35');
  grd.addColorStop(1, '#9C27B0');

  // Fill
  wx.beginPath();
  wx.moveTo(0, rh);
  for (let i = 0; i < len; i++) {
    wx.lineTo(i * dx, rh - (volHist[i] / 130) * rh * 0.9);
  }
  wx.lineTo(rw, rh);
  wx.closePath();
  wx.fillStyle = 'rgba(255,107,53,0.08)';
  wx.fill();

  // Stroke
  wx.strokeStyle = grd;
  wx.lineWidth = 1.5;
  wx.beginPath();
  for (let i = 0; i < len; i++) {
    const y = rh - (volHist[i] / 130) * rh * 0.9;
    i === 0 ? wx.moveTo(0, y) : wx.lineTo(i * dx, y);
  }
  wx.stroke();

  // Hits
  for (const hi of hitIdxs) {
    wx.fillStyle = 'rgba(255,23,68,0.5)';
    wx.fillRect(hi * dx - 1, 0, 2, rh);
  }

  // Max marker
  let mi = 0;
  for (let i = 1; i < len; i++) if (volHist[i] > volHist[mi]) mi = i;
  const mx = mi * dx, my = rh - (volHist[mi] / 130) * rh * 0.9;
  wx.fillStyle = '#FFD700';
  wx.beginPath();
  wx.arc(mx, my, 3, 0, Math.PI * 2);
  wx.fill();
  wx.font = 'bold 9px monospace';
  wx.fillStyle = '#FFD700';
  wx.textAlign = mx > rw * 0.8 ? 'right' : 'left';
  wx.fillText('★' + Math.round(volHist[mi]) + 'dB', mx + (mx > rw * 0.8 ? -6 : 6), my - 4);
}

// ═══════════════════════════════════════
// Character Drawing
// ═══════════════════════════════════════
function drawChar(cx, cy, sc, mode, alpha = 1) {
  ctx.save();
  ctx.globalAlpha = alpha;
  ctx.translate(cx, cy);
  ctx.scale(sc, sc);

  // Apply rotation during gameplay modes only
  if (mode === 'rising' || mode === 'fast' || mode === 'falling' || mode === 'worried') {
    ctx.rotate(charAngle);
  }

  const skin = '#FFD5B8', shirt = '#3D7BF7', pants = '#1A237E', tie = '#F44336', hair = '#2D2D2D', shoe = '#1A1A1A';

  // Hair
  ctx.fillStyle = hair;
  ctx.fillRect(-7, -24, 14, 5);
  ctx.fillRect(-6, -25, 12, 3);

  // Head
  ctx.fillStyle = skin;
  ctx.fillRect(-6, -19, 12, 11);

  // Ears
  ctx.fillRect(-7, -16, 2, 4);
  ctx.fillRect(5, -16, 2, 4);

  // Eyes
  if (mode === 'falling') {
    // Closed / resigned
    ctx.fillStyle = '#555';
    ctx.fillRect(-4, -15, 3, 1);
    ctx.fillRect(1, -15, 3, 1);
  } else if (mode === 'worried') {
    ctx.fillStyle = '#333';
    ctx.fillRect(-4, -16, 2, 2);
    ctx.fillRect(2, -16, 2, 2);
    // Worry brows
    ctx.fillRect(-5, -18, 3, 1);
    ctx.fillRect(2, -18, 3, 1);
  } else if (mode === 'fast') {
    // Glowing eyes
    ctx.fillStyle = '#FFD700';
    ctx.fillRect(-4, -16, 3, 3);
    ctx.fillRect(1, -16, 3, 3);
    ctx.fillStyle = '#FFF';
    ctx.fillRect(-3, -15, 1, 1);
    ctx.fillRect(2, -15, 1, 1);
  } else {
    // Normal / idle
    ctx.fillStyle = '#333';
    ctx.fillRect(-4, -16, 2, 3);
    ctx.fillRect(2, -16, 2, 3);
    // Pupils
    ctx.fillStyle = '#000';
    ctx.fillRect(-3, -15, 1, 2);
    ctx.fillRect(3, -15, 1, 2);
  }

  // Mouth
  if (mode === 'rising' || mode === 'fast') {
    ctx.fillStyle = '#333';
    ctx.fillRect(-3, -10, 6, 4);
    ctx.fillStyle = '#C62828';
    ctx.fillRect(-2, -9, 4, 3);
    ctx.fillStyle = '#FF8A80';
    ctx.fillRect(-1, -8, 2, 1);
  } else if (mode === 'idle') {
    ctx.fillStyle = '#999';
    ctx.fillRect(-2, -10, 4, 1);
    // Sigh effect (idle frame 2)
    if (Math.floor(idleT * 1.5) % 2 === 1) {
      ctx.fillStyle = 'rgba(200,200,200,0.3)';
      ctx.fillRect(3, -11, 4, 3);
    }
  } else if (mode === 'worried') {
    ctx.fillStyle = '#333';
    ctx.fillRect(-2, -10, 4, 2);
  } else {
    ctx.fillStyle = '#555';
    ctx.fillRect(-2, -10, 4, 2);
  }

  // Torso
  ctx.fillStyle = shirt;
  ctx.fillRect(-6, -8, 12, 11);
  // Collar
  ctx.fillStyle = '#ECEFF1';
  ctx.fillRect(-4, -8, 8, 2);

  // Tie
  ctx.fillStyle = tie;
  const tieWave = (mode === 'rising' || mode === 'fast') ? Math.sin(Date.now() * 0.01) * 1.2 : 0;
  ctx.fillRect(-1 + tieWave * 0.2, -6, 2, 8);
  ctx.fillRect(-2 + tieWave * 0.3, -5, 4, 2);
  ctx.fillRect(-2 + tieWave * 0.15, 0, 4, 2);

  // Arms
  ctx.fillStyle = shirt;
  if (mode === 'rising' || mode === 'fast') {
    // Arms spread up
    const wave = Math.sin(Date.now() * 0.008) * 2;
    ctx.fillRect(-9, -7 + wave, 3, 7);
    ctx.fillRect(6, -7 - wave, 3, 7);
    ctx.fillStyle = skin;
    ctx.fillRect(-9, -8 + wave, 3, 3);
    ctx.fillRect(6, -8 - wave, 3, 3);
  } else if (mode === 'worried') {
    const w = Math.sin(Date.now() * 0.015) * 3;
    ctx.fillRect(-9, -4 + w, 3, 6);
    ctx.fillRect(6, -2 - w, 3, 6);
    ctx.fillStyle = skin;
    ctx.fillRect(-9, -5 + w, 3, 3);
    ctx.fillRect(6, -3 - w, 3, 3);
  } else if (mode === 'falling') {
    // Ragdoll spread arms — tighter to torso
    const fwave = Math.sin(Date.now() * 0.006) * 1.5;
    ctx.fillRect(-9 + fwave, -3, 3, 6);
    ctx.fillRect(7 - fwave, -5, 3, 6);
    ctx.fillStyle = skin;
    ctx.fillRect(-9 + fwave, -4, 3, 3);
    ctx.fillRect(7 - fwave, -6, 3, 3);
  } else {
    // Arms down
    ctx.fillRect(-8, -6, 2, 9);
    ctx.fillRect(6, -6, 2, 9);
    ctx.fillStyle = skin;
    ctx.fillRect(-8, 2, 2, 3);
    ctx.fillRect(6, 2, 2, 3);
  }

  // Pants & Legs
  ctx.fillStyle = pants;
  if (mode === 'rising' || mode === 'fast') {
    // Animated kicking legs
    const kickL = [0, 3, 6, 3][legFrame];
    const kickR = [6, 3, 0, 3][legFrame];
    ctx.fillRect(-6 - kickL * 0.3, 3, 5, 7 + kickL * 0.2);
    ctx.fillRect(1 + kickR * 0.3, 3, 5, 7 + kickR * 0.2);
    // Shoes
    ctx.fillStyle = shoe;
    ctx.fillRect(-7 - kickL * 0.4, 10 + kickL * 0.3, 5, 2);
    ctx.fillRect(2 + kickR * 0.4, 10 + kickR * 0.3, 5, 2);
  } else if (mode === 'falling') {
    // Ragdoll spread legs
    const spread = Math.sin(Date.now() * 0.005) * 2;
    ctx.fillRect(-8 + spread, 3, 5, 8);
    ctx.fillRect(3 - spread, 3, 5, 8);
    ctx.fillStyle = shoe;
    ctx.fillRect(-9 + spread, 11, 5, 2);
    ctx.fillRect(4 - spread, 11, 5, 2);
  } else {
    // Normal static legs
    ctx.fillRect(-6, 3, 5, 7);
    ctx.fillRect(1, 3, 5, 7);
    ctx.fillStyle = shoe;
    ctx.fillRect(-7, 10, 5, 2);
    ctx.fillRect(2, 10, 5, 2);
  }

  ctx.restore();

  // Hit flash — blink entire character by redrawing with red tint
  if (charHitTimer > 0 && charHitFlash) {
    ctx.save();
    ctx.globalAlpha = 0.4;
    ctx.globalCompositeOperation = 'source-atop';
    ctx.fillStyle = '#FF1744';
    ctx.beginPath();
    ctx.arc(cx, cy - 5, 20 * sc, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalCompositeOperation = 'source-over';
    ctx.globalAlpha = 1;
    ctx.restore();
  }
}

// ═══════════════════════════════════════
// Background Layers
// ═══════════════════════════════════════
// ── Helpers ──
function lerp(a, b, t) { return a + (b - a) * Math.max(0, Math.min(1, t)); }
function smoothstep(t) { t = Math.max(0, Math.min(1, t)); return t * t * (3 - 2 * t); }

function lerpCol(a, b, t) {
  t = Math.max(0, Math.min(1, t));
  const p = (s) => parseInt(s.slice(1), 16);
  const ah = p(a), bh = p(b);
  const r = Math.round(lerp((ah >> 16) & 0xff, (bh >> 16) & 0xff, t));
  const g = Math.round(lerp((ah >> 8) & 0xff, (bh >> 8) & 0xff, t));
  const bl = Math.round(lerp(ah & 0xff, bh & 0xff, t));
  return `rgb(${r},${g},${bl})`;
}

function drawCloud(cx, cy, opacity) {
  ctx.fillStyle = `rgba(255,255,255,${opacity})`;
  ctx.beginPath();
  ctx.ellipse(cx, cy, 32, 14, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.ellipse(cx - 18, cy + 4, 22, 11, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.ellipse(cx + 16, cy + 3, 24, 12, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.ellipse(cx + 5, cy - 8, 18, 10, 0, 0, Math.PI * 2);
  ctx.fill();
}

// ── Sky color keyframes (continuous altitude-based) ──
const SKY_KEYS = [
  { alt: 0,    top: [0x1A,0x1A,0x2E], bot: [0x2A,0x2A,0x3A] },
  { alt: 60,   top: [0x2A,0x2A,0x4E], bot: [0x3A,0x3A,0x5A] },
  { alt: 100,  top: [0x1A,0x1A,0x3E], bot: [0x2A,0x2A,0x4E] },
  { alt: 200,  top: [0x0D,0x1B,0x2A], bot: [0x1B,0x28,0x38] },
  { alt: 400,  top: [0x0A,0x16,0x28], bot: [0x16,0x24,0x36] },
  { alt: 700,  top: [0x06,0x0E,0x1A], bot: [0x0A,0x14,0x20] },
  { alt: 1000, top: [0x02,0x04,0x08], bot: [0x06,0x0C,0x14] },
  { alt: 1500, top: [0x00,0x00,0x00], bot: [0x02,0x04,0x06] }
];

function getSkyColor(alt) {
  // Find the two keyframes we're between
  let lo = SKY_KEYS[0], hi = SKY_KEYS[SKY_KEYS.length - 1];
  for (let i = 0; i < SKY_KEYS.length - 1; i++) {
    if (alt >= SKY_KEYS[i].alt && alt <= SKY_KEYS[i + 1].alt) {
      lo = SKY_KEYS[i]; hi = SKY_KEYS[i + 1]; break;
    }
  }
  if (alt >= hi.alt) { lo = hi; }
  const range = hi.alt - lo.alt;
  const t = range > 0 ? smoothstep((alt - lo.alt) / range) : 0;
  return {
    top: `rgb(${Math.round(lerp(lo.top[0], hi.top[0], t))},${Math.round(lerp(lo.top[1], hi.top[1], t))},${Math.round(lerp(lo.top[2], hi.top[2], t))})`,
    bot: `rgb(${Math.round(lerp(lo.bot[0], hi.bot[0], t))},${Math.round(lerp(lo.bot[1], hi.bot[1], t))},${Math.round(lerp(lo.bot[2], hi.bot[2], t))})`
  };
}

// ── World-to-screen conversion ──
// screenY = (elementAltitude - cameraAlt) * parallaxFactor + screenAnchor
// screenAnchor = center of screen (H * 0.5) for "camera follows character"
// Camera altitude = dist (the character's altitude)
function worldToScreen(elementAlt, cameraAlt, parallaxFactor) {
  // Inverted: higher altitude = higher on screen when camera is below
  // When camera is at same altitude as element, element is at anchor
  // When camera is above element, element scrolls down
  return (elementAlt - cameraAlt) * -parallaxFactor + H * 0.5;
}

// ── Single unified background ──
function drawBg(d) {
  // === 1. SKY GRADIENT ===
  const sky = getSkyColor(d);
  const grad = ctx.createLinearGradient(0, 0, 0, H);
  grad.addColorStop(0, sky.top);
  grad.addColorStop(1, sky.bot);
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);

  // === 2. STARS (altitude 600m+, 3 parallax layers) ===
  const starOpacity = d < 600 ? 0 : Math.min(1, (d - 600) / 400);
  if (starOpacity > 0.01) {
    const now = Date.now();
    for (const s of stars) {
      // Each star at a fixed world position, parallax shifts it
      const sy = ((s.y * H * 8 - d * s.layer) % (H + 20) + H + 20) % (H + 20) - 10;
      if (sy < -5 || sy > H + 5) continue;
      const twinkle = 0.3 + 0.7 * Math.sin(now * 0.002 + s.p);
      const warmth = s.p / (Math.PI * 2);
      const r = 255;
      const g = 200 + Math.floor(warmth * 55);
      const b = 150 + Math.floor(warmth * 80);
      ctx.fillStyle = `rgba(${r},${g},${b},${twinkle * starOpacity})`;
      ctx.fillRect(s.x * W, sy, s.r, s.r);
    }
  }

  // === 3. NEBULA (very high altitude, subtle) ===
  if (d > 800) {
    const nebA = Math.min(0.06, (d - 800) / 5000);
    ctx.fillStyle = `rgba(156,39,176,${nebA})`;
    const nebY = worldToScreen(1400, d, 0.08);
    ctx.beginPath();
    ctx.ellipse(W * 0.3, nebY, 120, 70, 0.5, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = `rgba(100,50,180,${nebA * 0.6})`;
    ctx.beginPath();
    ctx.ellipse(W * 0.7, nebY - 40, 80, 50, -0.3, 0, Math.PI * 2);
    ctx.fill();
  }

  // === 4. MOON (altitude 1200m+) ===
  if (d > 900) {
    const moonScreenY = worldToScreen(1600, d, 0.06);
    const moonScreenX = W * 0.82;
    const moonA = smoothstep(Math.min(1, (d - 900) / 300));
    if (moonScreenY > -80 && moonScreenY < H + 80) {
      // Outer glow
      ctx.fillStyle = `rgba(255,255,230,${0.03 * moonA})`;
      ctx.beginPath();
      ctx.arc(moonScreenX, moonScreenY, 60, 0, Math.PI * 2);
      ctx.fill();
      // Mid glow
      ctx.fillStyle = `rgba(255,255,230,${0.06 * moonA})`;
      ctx.beginPath();
      ctx.arc(moonScreenX, moonScreenY, 38, 0, Math.PI * 2);
      ctx.fill();
      // Moon body
      ctx.fillStyle = `rgba(255,255,230,${0.14 * moonA})`;
      ctx.beginPath();
      ctx.arc(moonScreenX, moonScreenY, 22, 0, Math.PI * 2);
      ctx.fill();
      // Crescent shadow
      ctx.fillStyle = `rgba(0,0,10,${0.08 * moonA})`;
      ctx.beginPath();
      ctx.arc(moonScreenX + 6, moonScreenY - 3, 18, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  // === 5. EARTH CURVE (visible when very high, altitude 800+) ===
  if (d > 700) {
    const earthBaseY = worldToScreen(0, d, 0.15);
    if (earthBaseY < H + 500) {
      const earthA = smoothstep(Math.min(1, (d - 700) / 400));
      ctx.globalAlpha = earthA;
      // Ocean
      ctx.fillStyle = '#0D2847';
      ctx.beginPath();
      ctx.ellipse(W / 2, earthBaseY + 400, 550, 380, 0, 0, Math.PI * 2);
      ctx.fill();
      // Land mass
      ctx.fillStyle = 'rgba(20,60,30,0.5)';
      ctx.beginPath();
      ctx.ellipse(W / 2 - 50, earthBaseY + 375, 110, 70, 0.3, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = 'rgba(25,70,35,0.3)';
      ctx.beginPath();
      ctx.ellipse(W / 2 + 90, earthBaseY + 395, 70, 45, -0.3, 0, Math.PI * 2);
      ctx.fill();
      // Atmosphere rim
      ctx.strokeStyle = `rgba(80,160,220,${0.25 * earthA})`;
      ctx.lineWidth = 4;
      ctx.beginPath();
      ctx.ellipse(W / 2, earthBaseY + 400, 555, 385, 0, Math.PI + 0.25, Math.PI * 2 - 0.25);
      ctx.stroke();
      ctx.globalAlpha = 1;
    }
  }

  // === 6. CLOUD LAYER (altitude 300-600m) ===
  for (const c of cloudPositions) {
    const cy = worldToScreen(c.alt, d, 0.8);
    if (cy < -60 || cy > H + 60) continue;
    const cx = c.x * W + Math.sin(Date.now() * 0.0003 + c.alt * 0.01) * 15;
    // Clouds more opaque from below, thinner from above
    const relAlt = d - c.alt;
    let opacity;
    if (relAlt < -100) {
      // Well below cloud: see it above, getting brighter as approaching
      opacity = smoothstep(Math.min(1, (c.alt - d - 100) > 0 ? 0 : 1 - Math.abs(relAlt + 100) / 300)) * 0.4;
      opacity = Math.max(0.05, Math.min(0.5, 0.5 - Math.abs(relAlt + 100) / 600));
    } else if (relAlt < 50) {
      // Passing through
      opacity = 0.5 - Math.abs(relAlt) / 100 * 0.3;
    } else {
      // Above cloud: see it below, fading
      opacity = Math.max(0, 0.4 - (relAlt - 50) / 400);
    }
    if (opacity < 0.01) continue;
    ctx.save();
    ctx.translate(cx, cy);
    ctx.scale(c.scale, c.scale);
    drawCloud(0, 0, opacity);
    ctx.restore();
  }

  // === 7. CITY GROUND / HORIZON (altitude 0m) ===
  const groundScreenY = worldToScreen(0, d, 1.0);
  if (groundScreenY < H + 20 && d > 150 && d < 500) {
    const groundA = smoothstep(Math.min(1, (d - 150) / 80)) * smoothstep(Math.max(0, 1 - (d - 350) / 150));
    if (groundA > 0.01) {
      ctx.globalAlpha = groundA * 0.6;
      // Tiny city panorama at the ground line
      ctx.fillStyle = '#1A1A28';
      ctx.fillRect(0, groundScreenY, W, H - groundScreenY + 50);
      // Mini buildings on the horizon
      for (let i = 0; i < 20; i++) {
        const bx = (i / 20) * W;
        const bh = 5 + Math.sin(i * 1.7) * 4 + Math.cos(i * 0.9) * 3;
        ctx.fillStyle = i % 3 === 0 ? '#2A2A3A' : '#222235';
        ctx.fillRect(bx, groundScreenY - bh, W / 22, bh);
        // Tiny window lights
        if (i % 2 === 0) {
          ctx.fillStyle = 'rgba(240,240,192,0.6)';
          ctx.fillRect(bx + 2, groundScreenY - bh + 2, 1, 1);
          ctx.fillRect(bx + 5, groundScreenY - bh + 4, 1, 1);
        }
      }
      ctx.globalAlpha = 1;
    }
  }

  // === 8. BUILDINGS (altitude 0-250m) ===
  // Near buildings parallax: 2.5, far buildings: 1.5
  // Buildings are visible when camera is between ~80 and ~350
  // (office obscures them below ~70, they scroll off below ~350)
  for (let i = 0; i < buildings.length; i++) {
    const b = buildings[i];
    const bAltTop = b.h * 1.2; // building top altitude (proportional to height)
    const bAltBot = 0; // base at ground level
    const isNear = i < 10;
    const parallax = isNear ? 2.5 : 1.5;
    const topY = worldToScreen(bAltTop, d, parallax);
    const botY = worldToScreen(bAltBot, d, parallax);

    // Skip if completely off-screen
    if (topY > H + 50 || botY < -50) continue;

    // Office interior obscures buildings when inside office
    // Fade buildings in as we break through ceiling (d 70-100)
    let bAlpha = 1;
    if (d < 70) continue; // still inside, office walls block view
    if (d < 100) bAlpha = smoothstep((d - 70) / 30);

    // Fade out when far above
    if (d > 250) bAlpha *= Math.max(0, 1 - (d - 250) / 100);
    if (bAlpha < 0.01) continue;

    ctx.globalAlpha = bAlpha;

    // Position buildings on left/right sides of screen
    const side = i % 2 === 0 ? -1 : 1;
    const bx = side > 0
      ? W * 0.55 + (i % 10) * 18 + b.x * 40
      : -(i % 10) * 18 - b.x * 40 - b.w + W * 0.45;
    const drawH = Math.max(0, botY - topY);
    const drawW = b.w * 0.9;

    ctx.fillStyle = b.dark ? '#25253A' : '#30304A';
    ctx.fillRect(bx, topY, drawW, drawH);

    // Roof accent
    ctx.fillStyle = '#1A1A2E';
    ctx.fillRect(bx, topY, drawW, 3);

    // Window lights (nighttime)
    let wi = 0;
    for (let wy = topY + 6; wy < botY - 5; wy += 11) {
      for (let wx = bx + 4; wx < bx + drawW - 5; wx += 9) {
        if (wi < b.winOn.length) {
          if (b.winOn[wi]) {
            // Warm window light with slight color variation
            const warmR = 230 + Math.floor(Math.sin(wi * 0.7) * 20);
            const warmG = 220 + Math.floor(Math.sin(wi * 1.1) * 20);
            ctx.fillStyle = `rgba(${warmR},${warmG},160,0.85)`;
          } else {
            ctx.fillStyle = 'rgba(15,15,25,0.7)';
          }
          ctx.fillRect(wx, wy, 5, 7);
          wi++;
        }
      }
    }
    ctx.globalAlpha = 1;
  }

  // === 9. VILLAGE / GROUND (altitude 0-80m) ===
  // Visible when camera is low — landing zone when falling
  if (d < 120) {
    const alpha = d < 80 ? 1 : Math.max(0, 1 - (d - 80) / 40);
    if (alpha > 0.01) {
      ctx.globalAlpha = alpha;

      // Ground plane
      const groundY = worldToScreen(0, d, 2.0);
      if (groundY < H + 50) {
        ctx.fillStyle = '#2D4A2D';
        ctx.fillRect(0, groundY, W, H - groundY + 200);
        ctx.fillStyle = '#3A5A3A';
        ctx.fillRect(0, groundY, W, 3);
      }

      // Cute houses (bigger, colorful, pixel-art style)
      const houseColors = ['#C75B3A', '#3A7CC7', '#C7A83A', '#7B3AC7', '#3AC78A', '#C73A6E'];
      const roofColors = ['#8B3A22', '#2A5A8B', '#8B7A22', '#5A2A8B', '#2A8B5A', '#8B2A4E'];
      for (let i = 0; i < 8; i++) {
        const hAlt = 8 + (i % 3) * 5;
        const hy = worldToScreen(hAlt, d, 2.0);
        if (hy < -80 || hy > H + 80) continue;

        const side = i < 4 ? -1 : 1;
        const hx = side > 0
          ? W * 0.58 + (i % 4) * 30
          : W * 0.02 + (i % 4) * 28;
        const hw = 32 + (i % 3) * 8;
        const hh = 28 + (i % 4) * 6;
        const ci = i % houseColors.length;

        // House body
        ctx.fillStyle = houseColors[ci];
        ctx.fillRect(hx, hy - hh, hw, hh);
        // Roof (stepped pixel triangle)
        ctx.fillStyle = roofColors[ci];
        ctx.fillRect(hx - 3, hy - hh - 4, hw + 6, 5);
        ctx.fillRect(hx + 3, hy - hh - 8, hw - 6, 5);
        ctx.fillRect(hx + 7, hy - hh - 11, hw - 14, 4);
        ctx.fillRect(hx + 11, hy - hh - 14, hw - 22, 4);
        // Door
        ctx.fillStyle = '#5A3A20';
        ctx.fillRect(hx + hw / 2 - 4, hy - 14, 8, 14);
        ctx.fillStyle = '#FFD700';
        ctx.fillRect(hx + hw / 2 + 2, hy - 8, 2, 2);
        // Windows (warm light)
        ctx.fillStyle = 'rgba(255,220,120,0.85)';
        ctx.fillRect(hx + 4, hy - hh + 6, 7, 7);
        ctx.fillRect(hx + hw - 11, hy - hh + 6, 7, 7);
        // Window frame
        ctx.fillStyle = houseColors[ci];
        ctx.fillRect(hx + 7, hy - hh + 6, 1, 7);
        ctx.fillRect(hx + 4, hy - hh + 9, 7, 1);
        ctx.fillRect(hx + hw - 8, hy - hh + 6, 1, 7);
        ctx.fillRect(hx + hw - 11, hy - hh + 9, 7, 1);
        // Chimney
        if (i % 3 === 0) {
          ctx.fillStyle = '#6A4A3A';
          ctx.fillRect(hx + hw - 10, hy - hh - 18, 6, 8);
          ctx.fillStyle = 'rgba(200,200,200,0.3)';
          ctx.fillRect(hx + hw - 9, hy - hh - 22, 2, 4);
        }
      }

      // Trees
      const treePositions = [0.02, 0.15, 0.28, 0.72, 0.85, 0.95];
      for (let i = 0; i < treePositions.length; i++) {
        const tx = treePositions[i] * W;
        const tAlt = 3 + (i % 2) * 2;
        const ty = worldToScreen(tAlt, d, 2.0);
        if (ty < -40 || ty > H + 40) continue;
        // Trunk
        ctx.fillStyle = '#5A3A20';
        ctx.fillRect(tx, ty - 10, 3, 10);
        // Leaves (round-ish)
        ctx.fillStyle = i % 2 === 0 ? '#2D6A2D' : '#3D7A3D';
        ctx.fillRect(tx - 5, ty - 18, 13, 6);
        ctx.fillRect(tx - 3, ty - 22, 9, 5);
        ctx.fillRect(tx - 1, ty - 24, 5, 3);
      }

      // Street lamp
      if (groundY < H) {
        ctx.fillStyle = '#555';
        ctx.fillRect(W * 0.33, groundY - 28, 2, 28);
        ctx.fillRect(W * 0.32, groundY - 30, 6, 3);
        ctx.fillStyle = 'rgba(255,200,100,0.6)';
        ctx.fillRect(W * 0.325, groundY - 29, 4, 2);
        // Lamp glow
        ctx.fillStyle = 'rgba(255,200,100,0.04)';
        ctx.beginPath(); ctx.arc(W * 0.34, groundY - 25, 35, 0, Math.PI * 2); ctx.fill();
      }

      ctx.globalAlpha = 1;
    }
  }

  // === 10. ISS (altitude 1500m+) ===
  if (d > 1200) {
    const issY = worldToScreen(1800, d, 0.1);
    const issX = W / 2 + Math.sin(Date.now() * 0.0004) * 120;
    if (issY > -30 && issY < H + 30) {
      const issA = smoothstep(Math.min(1, (d - 1200) / 200));
      ctx.globalAlpha = issA;
      ctx.fillStyle = '#bbb';
      ctx.fillRect(issX - 16, issY - 2, 32, 4);
      ctx.fillRect(issX - 2, issY - 10, 4, 20);
      ctx.fillStyle = '#4FC3F7';
      ctx.fillRect(issX - 16, issY - 8, 12, 4);
      ctx.fillRect(issX + 4, issY - 8, 12, 4);
      ctx.fillRect(issX - 16, issY + 4, 12, 4);
      ctx.fillRect(issX + 4, issY + 4, 12, 4);
      ctx.globalAlpha = 1;
    }
  }

  // === 11. SATELLITES (altitude 1300m+) ===
  if (d > 1100) {
    const satA = smoothstep(Math.min(1, (d - 1100) / 200));
    const sx = ((Date.now() * 0.02 + d) % (W + 40)) - 20;
    const satY = worldToScreen(1500, d, 0.08);
    if (satY > -10 && satY < H + 10) {
      ctx.globalAlpha = satA;
      ctx.fillStyle = '#999';
      ctx.fillRect(sx, satY, 4, 4);
      ctx.fillStyle = '#4FC3F7';
      ctx.fillRect(sx - 6, satY + 1, 5, 2);
      ctx.fillRect(sx + 4, satY + 1, 5, 2);
      ctx.globalAlpha = 1;
    }
  }
}

// ═══════════════════════════════════════
// Drawing: Obstacles
// ═══════════════════════════════════════
function drawObs(o) {
  if (!o.alive) return;
  ctx.save();
  ctx.font = 'bold 12px system-ui,sans-serif';
  const m = ctx.measureText(o.txt);
  const bw = m.width + 28, bh = 38;
  const bx = o.x - bw / 2, by = o.y - bh / 2;

  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.15)';
  ctx.beginPath();
  if (ctx.roundRect) ctx.roundRect(bx + 2, by + 3, bw, bh, 10);
  else { ctx.rect(bx + 2, by + 3, bw, bh); }
  ctx.fill();

  // Bubble
  ctx.fillStyle = '#FFFFFF';
  ctx.beginPath();
  if (ctx.roundRect) ctx.roundRect(bx, by, bw, bh, 10);
  else { ctx.rect(bx, by, bw, bh); }
  ctx.fill();

  // Tail
  ctx.beginPath();
  ctx.moveTo(o.x - 7, by + bh);
  ctx.lineTo(o.x, by + bh + 10);
  ctx.lineTo(o.x + 7, by + bh);
  ctx.fill();

  // Border
  ctx.strokeStyle = 'rgba(0,0,0,0.08)';
  ctx.lineWidth = 1;
  ctx.beginPath();
  if (ctx.roundRect) ctx.roundRect(bx, by, bw, bh, 10);
  else { ctx.rect(bx, by, bw, bh); }
  ctx.stroke();

  // Text
  ctx.fillStyle = '#333';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(o.txt, o.x, o.y);
  ctx.restore();
}

// ═══════════════════════════════════════
// Drawing: Landing Scene
// ═══════════════════════════════════════
function drawLanding(dim = 0) {
  const now = Date.now();
  const bY = H * 0.58;

  // Night sky
  const g = ctx.createLinearGradient(0, 0, 0, H);
  g.addColorStop(0, '#0A0E1A');
  g.addColorStop(0.4, '#121828');
  g.addColorStop(0.7, '#1A2030');
  g.addColorStop(1, '#252535');
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, W, H);

  // Stars
  for (const s of stars) {
    if (s.y > 0.5) continue;
    const tw = 0.3 + 0.7 * Math.sin(now * 0.002 + s.p);
    ctx.fillStyle = `rgba(255,255,255,${tw * 0.5})`;
    ctx.fillRect(s.x * W, s.y * H, s.r, s.r);
  }

  // Moon
  ctx.fillStyle = 'rgba(255,255,230,0.04)';
  ctx.beginPath(); ctx.arc(W * 0.82, H * 0.1, 45, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = 'rgba(255,255,230,0.12)';
  ctx.beginPath(); ctx.arc(W * 0.82, H * 0.1, 22, 0, Math.PI * 2); ctx.fill();

  // City skyline
  for (let i = 0; i < 12; i++) {
    const b = buildings[i % buildings.length];
    const bw = b.w * 1.1;
    const bh = b.h * 0.85;
    const bx = i * (W / 10) - 10;
    ctx.fillStyle = b.dark ? '#1A1A2E' : '#222240';
    ctx.fillRect(bx, bY - bh, bw, bh + H);
    let wi = 0;
    for (let wy = bY - bh + 6; wy < bY; wy += 11) {
      for (let wx = bx + 4; wx < bx + bw - 5; wx += 9) {
        const on = wi < b.winOn.length ? b.winOn[wi] : false;
        ctx.fillStyle = on ? `rgba(${230 + (wi % 3) * 8},${210 + (wi % 5) * 6},140,0.85)` : '#0E0E1E';
        ctx.fillRect(wx, wy, 5, 7);
        wi++;
      }
    }
  }

  // Character idle (standing at building base line)
  const bobY = Math.sin(idleT * 1.5) * 2;
  drawChar(W / 2, bY - 14 + bobY, 3, 'idle');

  if (dim > 0) {
    ctx.fillStyle = `rgba(0,0,0,${dim})`;
    ctx.fillRect(0, 0, W, H);
  }
}

// ═══════════════════════════════════════
// Main Update
// ═══════════════════════════════════════
function update(dt) {
  idleT += dt;

  // Bounce timer
  if (bounceActive) {
    bounceTimer += dt;
    if (bounceTimer > 0.5) bounceActive = false;
  }

  // Shake decay
  shakeAmt *= 0.85;
  if (shakeAmt < 0.2) shakeAmt = 0;
  shakeX = (Math.random() - 0.5) * shakeAmt * 2;
  shakeY = (Math.random() - 0.5) * shakeAmt * 2;

  // Camera inertia — lags behind sudden velocity changes
  if (phase === PH.PLAY || phase === PH.FALL) {
    const accel = vel - prevVel;
    camTargY += accel * 3;
    camTargX += (Math.random() - 0.5) * Math.abs(accel) * 1.5;
    camTargY *= 0.85;
    camTargX *= 0.85;
    camOffX += (camTargX - camOffX) * 0.12;
    camOffY += (camTargY - camOffY) * 0.12;
    camRotTarg = accel * 0.015 + (Math.random() - 0.5) * normVol * 0.0003;
    camRotTarg *= 0.9;
    camRot += (camRotTarg - camRot) * 0.1;
  } else {
    camOffX *= 0.9; camOffY *= 0.9; camRot *= 0.9;
  }
  prevVel = vel;

  // Flash decay
  flashA = Math.max(0, flashA - dt * 5);

  // Float text
  if (floatTextA > 0) {
    floatTextTimer += dt;
    if (floatTextTimer > 2) {
      floatTextA -= dt * 2;
      $float.style.opacity = Math.max(0, floatTextA);
    }
  }

  // ─── COUNTDOWN ───
  if (phase === PH.CD) {
    cdT += dt;
    if (cdT >= 1) {
      cdT -= 1;
      cdVal--;
      if (cdVal > 0) {
        $cd.textContent = cdVal;
        $cd.style.color = '#fff';
        SFX.countdown();
      } else if (cdVal === 0) {
        $cd.textContent = '악!!!!!';
        $cd.style.color = '#FF1744';
        $cd.style.fontSize = 'min(100px,22vw)';
        SFX.go();
      } else {
        $cd.style.color = '#fff';
        $cd.style.fontSize = 'min(140px,30vw)';
        beginGame();
      }
    }
    const sc = 1 + 0.25 * Math.sin(cdT * Math.PI);
    $cd.style.transform = `scale(${sc})`;
  }

  // ─── PLAY ───
  if (phase === PH.PLAY) {
    gameT += dt;
    vol = readVol();
    normVol = Math.min(vol * 1.6, 150);
    if (normVol > maxVol) maxVol = normVol;

    volHist.push(normVol);

    // Thrust mapping
    if (normVol < 30) thrust = 0;
    else if (normVol < 60) thrust = ((normVol - 30) / 30) * 3;
    else if (normVol < 80) thrust = 3 + ((normVol - 60) / 20) * 4;
    else if (normVol < 100) thrust = 7 + ((normVol - 80) / 20) * 3;
    else thrust = 10 + ((normVol - 100) / 50) * 5;

    // Silence => fall
    if (normVol < 15) {
      silentT += dt;
      if (silentT > 0.5) thrust = -3;
    } else {
      silentT = 0;
    }

    // Sonic boom
    if (normVol > 100 && !sonicActive) {
      sonicActive = true;
      sonicT = 0;
      SFX.boom();
      shakeAmt = 20;
      camTargY = -30;
      try { navigator.vibrate([50, 30, 50, 30, 100]); } catch (e) {}
    }
    if (normVol < 75) sonicActive = false;
    if (sonicActive) sonicT += dt;

    // Physics
    const gravity = 2.0;
    const accel = (thrust - gravity) * dt * 2.8;
    vel += accel;
    vel = Math.max(vel, -4);
    dist += vel * dt * 35;
    if (dist < 0) dist = 0;

    // HUD
    const vPct = Math.min(normVol / 120 * 100, 100);
    $volFill.style.height = vPct + '%';
    if (vPct > 80) {
      $volGlow.style.height = vPct + '%';
      $volGlow.style.opacity = '1';
    } else {
      $volGlow.style.opacity = '0';
    }
    $volNum.textContent = Math.round(normVol);
    $distNum.textContent = Math.round(dist) + 'm';

    // Character angle physics
    const wobbleFreq = 3 + normVol * 0.05;
    const wobbleAmp = (normVol / 150) * 0.35;
    charAngle = Math.sin(gameT * wobbleFreq) * wobbleAmp + charVelAngle;

    // Angular velocity decay (from obstacle hits)
    charVelAngle *= 0.92;
    if (Math.abs(charVelAngle) < 0.01) charVelAngle = 0;

    // Leg animation: alternate faster when going faster
    legTimer += dt;
    const legSpeed = 0.15 - Math.min(vel * 0.01, 0.1);
    if (legTimer > Math.max(legSpeed, 0.05)) {
      legTimer = 0;
      legFrame = (legFrame + 1) % 4;
    }

    // Hit timer decay
    if (charHitTimer > 0) {
      charHitTimer -= dt;
      charHitFlash = Math.floor(charHitTimer * 10) % 2 === 0;
    }

    // Obstacles
    obsTimer += dt;
    const obsInterval = 2 + Math.random() * 2;
    if (obsTimer > obsInterval && obs.filter(o => o.alive).length < 4) {
      obsTimer = 0;
      spawnObs();
    }

    const cx = W / 2, cy = H * 0.42;
    for (const o of obs) {
      if (!o.alive) continue;
      o.time += dt;
      // Move toward target
      const dx = o.tx - o.x;
      const spd = Math.min(Math.abs(dx), Math.abs(dx) * dt * 3.5);
      o.x += Math.sign(dx) * spd;

      // Collision
      const od = Math.sqrt((cx - o.x) ** 2 + (cy - o.y) ** 2);
      if (od < 45 && o.alive && o.time > 0.3) {
        if (normVol > 70) {
          // Destroy!
          o.alive = false;
          destroyCount++;
          destroyTexts.push(o.txt);
          addParts(o.x, o.y, 15, '#FF1744', 5, 0.7);
          addParts(o.x, o.y, 8, '#FFF', 3, 0.4);
          addFloat(o.x, o.y - 20, '읽씹!', '#FFD700', 20);
          SFX.destroy();
          flashCol = '#FFD700'; flashA = 0.25;
        } else {
          // Hit (slow down)
          o.alive = false;
          vel *= 0.65;
          SFX.hit();
          flashCol = '#FF1744'; flashA = 0.35;
          shakeAmt = 18;
          camTargY = 25;
          camTargX = (Math.random() - 0.5) * 30;
          camRotTarg = (Math.random() - 0.5) * 0.06;
          charVelAngle = (Math.random() > 0.5 ? 1 : -1) * (0.5 + Math.random() * 0.5);
          charHitTimer = 0.6;
          try { navigator.vibrate(100); } catch (e) {}
          hitIdxs.push(volHist.length);
          addParts(o.x, o.y, 6, '#FF1744', 3, 0.4);
        }
      }
    }
    obs = obs.filter(o => o.alive);

    // Trail smoke
    if (vel > 0.5) {
      addSmoke(cx, cy + 30);
    }
    // Afterimage
    if (vel > 4) {
      trails.push({ x: cx, y: cy, a: 0.4 });
      if (trails.length > 4) trails.shift();
    }
    for (const t of trails) t.a -= dt * 2;
    trails = trails.filter(t => t.a > 0);

    // Ghost replay
    if (ghost && ghost.v) {
      const gLen = ghost.v.length;
      if (!gDone) {
        gIdx += dt * (gLen / MAX_TIME);
        if (gIdx >= gLen) {
          gDone = true;
          gDist = ghost.d;
        } else {
          const gv = ghost.v[Math.min(Math.floor(gIdx), gLen - 1)];
          const gt = gv > 30 ? ((gv - 30) / 70) * 10 : 0;
          gDist += (gt - 2) * dt * 30 * 0.5;
          if (gDist < 0) gDist = 0;
          if (gDist > ghost.d) gDist = ghost.d;
        }
      }

      const maxD = Math.max(dist, ghost.d, 50);
      $gBarMe.style.width = Math.min(dist / maxD * 100, 100) + '%';
      $gBarThem.style.width = Math.min(ghost.d / maxD * 100, 100) + '%';
      $glMe.textContent = `나 ${Math.round(dist)}m`;
      $glTh.textContent = `${Math.round(ghost.d)}m ${ghost.n || '???'}`;

      // Overtake
      if (dist > gDist && !overtookShown && gDist > 5) {
        overtookShown = true;
        showFloatEvent('추월!!!');
        SFX.overtake();
        flashCol = '#FFD700'; flashA = 0.4;
        addParts(W / 2, H * 0.3, 20, '#FFD700', 6, 0.8);
      }
      // Ghost stops
      if (gDone && !gDoneShown) {
        gDoneShown = true;
        showFloatEvent(`${ghost.n || '???'} 여기서 야근 확정 ㅋㅋ`);
      }
    }

    // Check end
    if (gameT >= MAX_TIME || (vel < -3 && gameT > 1)) {
      phase = PH.FALL;
      fallT = 0;
      $hud.classList.add('hidden');
      obs = [];
    }
  }

  // ─── FALLING ───
  if (phase === PH.FALL) {
    fallT += dt;

    // Phase 1 (0~0.8s): Hang in air, momentum dies
    if (fallT < 0.8) {
      vel *= 0.92;
      charAngle += dt * 2;
    }
    // Phase 2 (0.8~1.5s): Snap dist to 0 rapidly (ground rushing up)
    else if (dist > 5) {
      dist *= 0.88;
      vel = -20;
      charAngle += dt * (8 + (1500 - dist) * 0.01);
      shakeAmt = Math.max(shakeAmt, 6);
      camTargY += dt * 15;
    }
    // Phase 3: Impact on ground (once only)
    else if (dist <= 5 && !fallImpacted) {
      fallImpacted = true;
      dist = 0;
      vel = 0;
      shakeAmt = 30;
      camTargY = 40;
      camRotTarg = (Math.random() - 0.5) * 0.08;
      charVelAngle = (Math.random() - 0.5) * 3;
      flashCol = '#FF6B35'; flashA = 0.5;
      SFX.land();
      try { navigator.vibrate([100, 30, 200]); } catch (e) {}
      const cx = W / 2, cy = H * 0.42;
      addParts(cx, cy + 30, 20, '#FF6B35', 8, 0.8);
      addParts(cx, cy + 30, 10, '#FFF', 5, 0.5);
      noise(0.3, 0.12);
      fallImpactT = 0;
    }

    // After impact, gradually settle charAngle toward 0
    if (fallImpacted) {
      charAngle *= 0.85;
      if (Math.abs(charAngle) < 0.05) charAngle = 0;
      fallImpactT = (fallImpactT || 0) + dt;
      if (fallImpactT > 1.2) {
        beginResult();
      }
    }

    $distNum.textContent = Math.round(dist) + 'm';
  }

  // ─── Particles ───
  for (const p of parts) {
    p.life -= dt;
    p.x += p.vx;
    p.y += p.vy;
    p.vy += dt * 3;
    if (p.smoke) p.size += dt * 4;
  }
  parts = parts.filter(p => p.life > 0);

  // Floating text
  for (const f of floats) {
    f.life -= dt;
    f.y += f.vy;
    f.vy *= 0.98;
  }
  floats = floats.filter(f => f.life > 0);
}

// ═══════════════════════════════════════
// Main Draw
// ═══════════════════════════════════════
function draw() {
  ctx.save();
  ctx.translate(W / 2 + shakeX + camOffX, H / 2 + shakeY + camOffY);
  ctx.rotate(camRot);
  ctx.translate(-W / 2, -H / 2);
  ctx.clearRect(-60, -60, W + 120, H + 120);

  if (phase === PH.LAND || phase === PH.CHALLENGE) {
    drawLanding();
  } else if (phase === PH.CD) {
    drawLanding(0.55);
  } else if (phase === PH.PLAY || phase === PH.FALL) {
    drawGameScene();
  }

  // Particles
  for (const p of parts) {
    const a = Math.max(0, p.life / p.ml);
    if (p.smoke) {
      ctx.fillStyle = `rgba(255,${120 + Math.random() * 60},50,${a * 0.5})`;
    } else {
      ctx.globalAlpha = a;
      ctx.fillStyle = p.col;
    }
    ctx.fillRect(p.x - p.size / 2, p.y - p.size / 2, p.size, p.size);
    ctx.globalAlpha = 1;
  }

  // Float texts (읽씹! etc)
  for (const f of floats) {
    const a = Math.max(0, f.life / f.ml);
    ctx.globalAlpha = a;
    ctx.font = `bold ${f.size}px system-ui`;
    ctx.fillStyle = f.col;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(f.txt, f.x, f.y);
    // Glow
    ctx.shadowColor = f.col;
    ctx.shadowBlur = 10;
    ctx.fillText(f.txt, f.x, f.y);
    ctx.shadowBlur = 0;
    ctx.globalAlpha = 1;
  }

  // Flash overlay (subtle screen tint only)
  if (flashA > 0) {
    ctx.globalAlpha = flashA * 0.15;
    ctx.fillStyle = flashCol;
    ctx.fillRect(-20, -20, W + 40, H + 40);
    ctx.globalAlpha = 1;
  }

  ctx.restore();
}

function drawGameScene() {
  drawBg(dist);

  // Draw obstacles
  for (const o of obs) drawObs(o);

  const cx = W / 2, cy = H * 0.42;

  // Trails (afterimage)
  for (let i = 0; i < trails.length; i++) {
    const t = trails[i];
    drawChar(t.x, cy + (trails.length - i) * 12, 2.5, 'fast', t.a * 0.25);
  }

  // Ghost character
  if (ghost && (phase === PH.PLAY || phase === PH.FALL)) {
    const gx = cx + 35;
    const gf = gDone ? 'falling' : 'rising';
    drawChar(gx, cy, 2.5, gf, 0.3);
    ctx.font = 'bold 10px system-ui';
    ctx.fillStyle = 'rgba(255,255,255,0.35)';
    ctx.textAlign = 'center';
    ctx.fillText(ghost.n || '???', gx, cy - 35);
    ctx.fillText(Math.round(gDist) + 'm', gx, cy - 24);
  }

  // Main character
  let mode = 'rising';
  if (vel > 5) mode = 'fast';
  else if (vel < -0.5) mode = phase === PH.FALL ? 'falling' : 'worried';
  let charDrawY = cy;
  if (bounceActive) {
    charDrawY = cy - Math.abs(Math.sin(bounceTimer * Math.PI * 4)) * 15 * (1 - bounceTimer / 0.5);
  }
  drawChar(cx, charDrawY, 3.2, mode);

  // Thrust flame
  if (vel > 0 && phase === PH.PLAY) {
    const fh = Math.min(vel * 5, 50);
    const flick = Math.random() * 6;
    const fy = cy + 35;

    // Outer flame
    ctx.fillStyle = '#FF6B35';
    ctx.beginPath();
    ctx.moveTo(cx - 10, fy);
    ctx.lineTo(cx + 10, fy);
    ctx.lineTo(cx + flick, fy + fh);
    ctx.fill();

    // Inner flame
    ctx.fillStyle = '#FFD700';
    ctx.beginPath();
    ctx.moveTo(cx - 6, fy);
    ctx.lineTo(cx + 6, fy);
    ctx.lineTo(cx + flick * 0.4, fy + fh * 0.6);
    ctx.fill();

    // Core
    ctx.fillStyle = '#FFF';
    ctx.beginPath();
    ctx.moveTo(cx - 3, fy);
    ctx.lineTo(cx + 3, fy);
    ctx.lineTo(cx + flick * 0.2, fy + fh * 0.3);
    ctx.fill();
  }

  // Sonic boom ring
  if (sonicActive && sonicT < 0.6) {
    const r = sonicT * 250;
    const a = 1 - sonicT / 0.6;
    ctx.strokeStyle = `rgba(255,255,255,${a})`;
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.arc(cx, cy, r, 0, Math.PI * 2);
    ctx.stroke();

    // Second ring
    if (sonicT > 0.1) {
      const r2 = (sonicT - 0.1) * 200;
      ctx.strokeStyle = `rgba(156,39,176,${a * 0.5})`;
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(cx, cy, r2, 0, Math.PI * 2);
      ctx.stroke();
    }
  }

  // Speed lines for fast movement
  if (vel > 3) {
    const lineA = Math.min(1, (vel - 3) / 7);
    ctx.strokeStyle = `rgba(255,255,255,${lineA * 0.2})`;
    ctx.lineWidth = 1;
    for (let i = 0; i < 8; i++) {
      const lx = Math.random() * W;
      const ly = Math.random() * H;
      const ll = 20 + vel * 5;
      ctx.beginPath();
      ctx.moveTo(lx, ly);
      ctx.lineTo(lx, ly + ll);
      ctx.stroke();
    }
  }
}

// ═══════════════════════════════════════
// Game Loop
// ═══════════════════════════════════════
let lastTs = 0;
function loop(ts) {
  const dt = Math.min((ts - lastTs) / 1000, 0.05);
  lastTs = ts;
  update(dt);
  draw();
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);

</script>
</body>
</html>
