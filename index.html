<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>sebyul</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden;font-family:'Pretendard',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}
body{background:#0a0a0f;color:#e0e0e0;display:flex;align-items:center;justify-content:center}
canvas{position:fixed;top:0;left:0;z-index:0}
.container{position:relative;z-index:1;text-align:center;padding:40px}
h1{font-size:clamp(2rem,8vw,5rem);font-weight:900;background:linear-gradient(135deg,#a78bfa,#60a5fa,#34d399,#fbbf24,#f472b6);background-size:300% 300%;-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;animation:gradient 6s ease infinite}
@keyframes gradient{0%,100%{background-position:0% 50%}50%{background-position:100% 50%}}
.subtitle{margin-top:16px;font-size:clamp(0.9rem,2.5vw,1.3rem);color:#888;font-weight:300;letter-spacing:2px}
.poem{margin-top:40px;max-width:480px;margin-left:auto;margin-right:auto;line-height:2;font-size:clamp(0.85rem,2vw,1.05rem);color:#666;font-weight:300}
.poem em{color:#a78bfa;font-style:normal}
.links{margin-top:48px;display:flex;gap:16px;justify-content:center;flex-wrap:wrap}
.links a{color:#555;text-decoration:none;font-size:13px;letter-spacing:1px;padding:8px 20px;border:1px solid #222;border-radius:999px;transition:all .3s}
.links a:hover{color:#a78bfa;border-color:#a78bfa;box-shadow:0 0 20px rgba(167,139,250,0.15)}
.footer{position:fixed;bottom:20px;left:0;right:0;text-align:center;z-index:1;font-size:11px;color:#333;letter-spacing:1px}
</style>
</head>
<body>
<canvas id="stars"></canvas>
<div class="container">
  <h1>sebyul</h1>
  <p class="subtitle">somewhere between stars and code</p>
  <div class="poem">
    <em>404</em>번째 은하에서 온 신호를 해석하는 중입니다.<br>
    우주의 엔트로피는 증가하지만,<br>
    좋은 코드의 복잡도는 줄어들어야 합니다.<br>
    <br>
    커피 한 잔의 열역학적 에너지가<br>
    <em>10<sup>23</sup></em>개의 분자 운동으로 변환되는 동안,<br>
    저는 한 줄의 코드를 씁니다.<br>
    <br>
    이 페이지는 <em>아무것도 아닌 것</em>의<br>
    아름다움에 대한 실험입니다.
  </div>
  <div class="links">
    <a href="https://github.com/sebyul2">GitHub</a>
  </div>
</div>
<div class="footer">this page is mass &times; the speed of light&sup2;</div>

<script>
const canvas=document.getElementById('stars'),ctx=canvas.getContext('2d');
let w,h,stars=[];
function resize(){w=canvas.width=innerWidth;h=canvas.height=innerHeight;stars=[];for(let i=0;i<200;i++)stars.push({x:Math.random()*w,y:Math.random()*h,r:Math.random()*1.5+0.3,dx:(Math.random()-0.5)*0.15,dy:(Math.random()-0.5)*0.15,o:Math.random()})}
function draw(){ctx.clearRect(0,0,w,h);for(const s of stars){s.o+=Math.sin(Date.now()*0.001+s.x)*0.005;const o=Math.max(0.1,Math.min(1,(s.o+1)/2*0.7+0.1));ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);ctx.fillStyle=`rgba(180,170,255,${o})`;ctx.fill();s.x+=s.dx;s.y+=s.dy;if(s.x<-5)s.x=w+5;if(s.x>w+5)s.x=-5;if(s.y<-5)s.y=h+5;if(s.y>h+5)s.y=-5}requestAnimationFrame(draw)}
addEventListener('resize',resize);resize();draw();
</script>
</body>
</html>
